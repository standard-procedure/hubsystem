default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: hubsystem_development

test:
  <<: *default
  database: hubsystem_test

production:
  primary:
    <<: *default
    database: hubsystem_production
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *default
    database: hubsystem_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: hubsystem_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: hubsystem_production_cable
    migrations_paths: db/cable_migrate
